services:
  cpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: tuzkaocr:cpu
    env_file:
      - ./tuzkaocr.env
    environment:
      TUZKAOCR_RESULTS_DIR: /app/results
      TUZKAOCR_SPOOL_DIR: /app/spool
    user: "${TUZKAOCR_RUN_UID:-1000}:${TUZKAOCR_RUN_GID:-1000}"
    ports:
      - "${TUZKAOCR_CPU_PORT:-8000}:8000"
    volumes:
      - ./results:/app/results
      - ./spool:/app/spool
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 120s

  gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: tuzkaocr:gpu
    env_file:
      - ./tuzkaocr.env
    environment:
      TUZKAOCR_DEVICE: cuda
      TUZKAOCR_RESULTS_DIR: /app/results
      TUZKAOCR_SPOOL_DIR: /app/spool
    user: "${TUZKAOCR_RUN_UID:-1000}:${TUZKAOCR_RUN_GID:-1000}"
    ports:
      - "${TUZKAOCR_GPU_PORT:-8001}:8000"
    volumes:
      - ./results:/app/results
      - ./spool:/app/spool
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 120s
    profiles: [gpu]
